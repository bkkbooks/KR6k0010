body:
  text: 四分比丘戒本并序西太原寺沙門懷素集夫戒者乃是定慧之宏基聖賢之妙趾窮八正之道盡七覺之源然既樹五制之良規傳須獲實揚六和之清訓學者知詮竊尋流行總有四本據其理雖復同會其文則有異致使弘揚失於宗敘修奉乖於行儀虧鹿野之微言紊龍城之要旨故今詳撿律本參驗戒心依於正文録之如左庶使順菩提之妙業成實相之嘉謀作六趣之舟航為三乘之軌躅者也
  hash: sha256:3c1d735c24f7cafb9a0bd8c447d393a78704b6d6613a4b0865d35b115c6e4f03
